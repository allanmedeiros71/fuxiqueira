{% extends 'base.html' %}

{% block title %}Senha Alterada - Sistema de Bioimpedância{% endblock %}

{% block content %}
<div class="min-h-[80vh] flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
    <div class="max-w-md w-full space-y-8 bg-white p-8 rounded-xl shadow-lg border border-gray-100 text-center">
        <div>
            <svg class="mx-auto h-12 w-12 text-green-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
            <h2 class="mt-4 text-3xl font-extrabold text-gray-900">
                Senha Alterada!
            </h2>
            <p class="mt-4 text-sm text-gray-600">
                Sua senha foi alterada com sucesso. Você já pode fazer login com sua nova senha.
            </p>
        </div>
        <div class="mt-8">
            <a href="{% url 'login' %}" class="w-full flex justify-center py-3 px-4 border border-transparent text-sm font-medium rounded-md text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition duration-150 ease-in-out">
                Ir para o Login
            </a>
        </div>
    </div>
</div>
{% endblock %}
