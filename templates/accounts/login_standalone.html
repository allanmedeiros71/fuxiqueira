<!DOCTYPE html>
<html lang="pt-BR">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="description"
              content="Sistema de Acompanhamento de Bioimpedância - Login">
        <title>Login - Sistema de Bioimpedância</title>
        {% load static %}
        <link rel="stylesheet" href="{% static 'css/auth.css' %}">
        <style>
        /* Estilos adicionais específicos do login */
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        
        .login-container {
            background: linear-gradient(to bottom right, rgb(239 246 255), rgb(224 231 255));
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 3rem 1rem;
        }
        
        .form-container {
            max-width: 28rem;
            width: 100%;
        }
        
        .icon-container {
            margin: 0 auto;
            height: 3rem;
            width: 3rem;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 9999px;
            background-color: rgb(37 99 235);
        }
        
        .form-box {
            background-color: rgb(255 255 255 / 0.9);
            backdrop-filter: blur(12px);
            border-radius: 1rem;
            box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.25);
            padding: 2rem;
            border: 1px solid rgb(255 255 255 / 0.4);
        }
        
        .input-field {
            appearance: none;
            position: relative;
            display: block;
            width: 100%;
            padding: 0.75rem 0.75rem;
            border: 1px solid rgb(209 213 219);
            background-color: rgb(255 255 255 / 0.8);
            backdrop-filter: blur(4px);
            color: rgb(17 24 39);
            border-radius: 0.5rem;
            font-size: 1rem;
            transition: all 150ms ease-in-out;
        }
        
        .input-field:focus {
            outline: none;
            border-color: transparent;
            box-shadow: 0 0 0 3px rgb(59 130 246);
        }
        
        .input-field::placeholder {
            color: rgb(107 114 128);
        }
        
        .submit-btn {
            position: relative;
            width: 100%;
            display: flex;
            justify-content: center;
            padding: 0.75rem 1rem;
            border: 1px solid transparent;
            font-size: 0.875rem;
            font-weight: 500;
            border-radius: 0.5rem;
            color: white;
            background-color: rgb(37 99 235);
            cursor: pointer;
            transition: all 150ms ease-in-out;
        }
        
        .submit-btn:hover {
            background-color: rgb(29 78 216);
        }
        
        .submit-btn:focus {
            outline: none;
            box-shadow: 0 0 0 3px rgb(59 130 246), 0 0 0 6px rgb(59 130 246 / 0.1);
        }
        
        .message {
            padding: 0.75rem;
            border-radius: 0.5rem;
            margin-bottom: 0.5rem;
            font-size: 0.875rem;
        }
        
        .message.error {
            background-color: rgb(254 242 242);
            color: rgb(153 27 27);
            border: 1px solid rgb(254 202 202);
        }
        
        .message.success {
            background-color: rgb(240 253 244);
            color: rgb(22 101 52);
            border: 1px solid rgb(187 247 208);
        }
        
        .link {
            color: rgb(37 99 235);
            text-decoration: none;
            font-weight: 500;
            transition: color 150ms ease-in-out;
        }
        
        .link:hover {
            color: rgb(59 130 246);
        }
        </style>
    </head>
    <body>
        <div class="login-container">
            <div class="form-container">
                <div class="text-center space-y-8">
                    <div>
                        <div class="icon-container">
                            <svg style="height: 1.5rem;
                                        width: 1.5rem;
                                        color: white"
                                 fill="none"
                                 stroke="currentColor"
                                 viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z">
                                </path>
                            </svg>
                        </div>
                        <h2 style="margin-top: 1.5rem;
                                   font-size: 1.875rem;
                                   line-height: 2.25rem;
                                   font-weight: 800;
                                   color: rgb(17 24 39)">Sistema de Bioimpedância</h2>
                        <p style="margin-top: 0.5rem;
                                  font-size: 0.875rem;
                                  line-height: 1.25rem;
                                  color: rgb(75 85 99)">Acompanhe sua evolução corporal com precisão</p>
                    </div>
                    <div class="form-box">
                        <form method="post"
                              style="display: flex;
                                     flex-direction: column;
                                     gap: 1.5rem">
                            {% csrf_token %}
                            {% if messages %}
                                <div style="display: flex; flex-direction: column; gap: 0.5rem;">
                                    {% for message in messages %}
                                        <div class="message {% if message.tags == 'error' %}error{% else %}success{% endif %}">{{ message }}</div>
                                    {% endfor %}
                                </div>
                            {% endif %}
                            <div>
                                <label for="id_username"
                                       style="display: block;
                                              font-size: 0.875rem;
                                              font-weight: 500;
                                              color: rgb(55 65 81);
                                              margin-bottom: 0.5rem">Email ou Nome de Usuário</label>
                                <input id="id_username"
                                       name="username"
                                       type="text"
                                       required
                                       class="input-field"
                                       placeholder="Digite seu email ou usuário">
                            </div>
                            <div>
                                <label for="id_password"
                                       style="display: block;
                                              font-size: 0.875rem;
                                              font-weight: 500;
                                              color: rgb(55 65 81);
                                              margin-bottom: 0.5rem">Senha</label>
                                <input id="id_password"
                                       name="password"
                                       type="password"
                                       required
                                       class="input-field"
                                       placeholder="Digite sua senha">
                            </div>
                            <div>
                                <button type="submit" class="submit-btn">
                                    <span style="position: absolute;
                                                 left: 0;
                                                 top: 0;
                                                 bottom: 0;
                                                 display: flex;
                                                 align-items: center;
                                                 padding-left: 0.75rem">
                                        <svg style="height: 1.25rem;
                                                    width: 1.25rem;
                                                    color: rgb(191 219 254)"
                                             fill="none"
                                             stroke="currentColor"
                                             viewBox="0 0 24 24">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1">
                                            </path>
                                        </svg>
                                    </span>
                                    Entrar
                                </button>
                            </div>
                            <div style="text-align: center;">
                                <p style="font-size: 0.875rem; color: rgb(75 85 99);">
                                    Não tem uma conta?
                                    <a href="{% url 'signup' %}" class="link">Solicite cadastro</a>
                                </p>
                                <p style="font-size: 0.75rem;
                                          color: rgb(107 114 128);
                                          margin-top: 0.5rem">⚠️ Cadastro requer aprovação do administrador</p>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </body>
</html>
