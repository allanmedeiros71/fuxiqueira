{% extends 'base.html' %}

{% block title %}Email Enviado - Sistema de Bioimpedância{% endblock %}

{% block content %}
<div class="min-h-[80vh] flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
    <div class="max-w-md w-full space-y-8 bg-white p-8 rounded-xl shadow-lg border border-gray-100 text-center">
        <div>
            <svg class="mx-auto h-12 w-12 text-blue-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
            </svg>
            <h2 class="mt-4 text-3xl font-extrabold text-gray-900">
                Email Enviado!
            </h2>
            <p class="mt-4 text-sm text-gray-600">
                Enviamos instruções para o seu email de como redefinir a sua senha.
                Por favor, verifique sua caixa de entrada e a pasta de spam.
            </p>
        </div>
        <div class="mt-8">
            <a href="{% url 'login' %}" class="w-full flex justify-center py-3 px-4 border border-transparent text-sm font-medium rounded-md text-blue-700 bg-blue-100 hover:bg-blue-200 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition duration-150 ease-in-out">
                Voltar para o Login
            </a>
        </div>
    </div>
</div>
{% endblock %}
